{%- extends "base.html" -%}
{# Extends base.html template #}  {#Jinja formatting#}

{% block head %}
    <title>TaskMaster</title>
{% endblock %}

{% block content %}
    <div class="content">
        <h1 style="text-align:center;">Update Task</h1>

        <div class="form">
            <form action="/update/{{ task.id }}" method="POST">
                <input type="text" name="content" id="content" value="{{task.content}}" placeholder="Add a new task..." required>
                <input type="submit" value="Update">
            </form>
        </div>
    </div>
{% endblock %}c
